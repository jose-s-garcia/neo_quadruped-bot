<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NEO · Centro de Comando</title>
<link rel="stylesheet" href="css/style.css">
<!-- Librerias auto-hospedadas (funciona offline, sin CDN) -->
<script src="vendor/nipplejs.min.js"></script>
<script src="vendor/blockly_compressed.js"></script>
<script src="vendor/blocks_compressed.js"></script>
<script src="vendor/blockly_es.js"></script>
</head>
<body>
<div class="grid-bg"></div>

<!-- BARRA SUPERIOR -->
<header class="topbar">
  <div class="brand">
    <button class="hamburger" id="navToggle" aria-label="Abrir menú" title="Menú">☰</button>
    <!-- Logo UVM: si existe assets/uvm-logo.png se usa; si no, cae al emblema SVG (El Higueron) -->
    <span class="uvm-emblem" title="Universidad Valle del Momboy">
      <img src="assets/uvm-logo.png" alt="UVM"
           onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">
      <svg viewBox="0 0 48 48" fill="none" style="display:none" aria-hidden="true">
        <circle cx="24" cy="24" r="21.5" stroke="currentColor" stroke-width="2.2"/>
        <line x1="13" y1="34" x2="35" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <rect x="22.6" y="24" width="2.8" height="10.6" rx="1" fill="currentColor"/>
        <circle cx="24" cy="17.4" r="6.2" fill="currentColor"/>
        <circle cx="17.8" cy="21.4" r="5" fill="currentColor"/>
        <circle cx="30.2" cy="21.4" r="5" fill="currentColor"/>
      </svg>
    </span>
    <span class="brand-text">
      <span class="brand-name"><span class="logo">◣◢</span> NEO</span>
      <span class="brand-sub">Universidad Valle del Momboy</span>
    </span>
  </div>
  <div class="status">
    <span class="chip" id="connChip"><i class="dot"></i> <span id="connText">conectando…</span></span>
    <span class="chip" id="modeChip">MODO · <b id="modeText">—</b></span>
    <span class="chip battchip"><i class="ic">⚡</i> <span id="battText">8.4V</span></span>
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema claro/oscuro">🌙</button>
  </div>
</header>
<div class="nav-scrim" id="navScrim"></div>

<!-- LAYOUT PRINCIPAL -->
<div class="layout">

  <!-- SIDEBAR: niveles educativos -->
  <nav class="sidebar">
    <div class="nav-group">
      <div class="nav-title">control</div>
      <button class="nav-item active" data-view="home">🏠 Inicio</button>
      <button class="nav-item" data-view="dashboard">⬡ Dashboard</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">inicial</div>
      <button class="nav-item" data-view="inicial-drive">⊳ Maneja al robot</button>
      <button class="nav-item" data-view="inicial-blocks">⊞ Bloques</button>
      <button class="nav-item" data-view="inicial-tricks">★ Trucos</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">secundaria</div>
      <button class="nav-item" data-view="sec-blocks">⊞ Bloques + sensores</button>
      <button class="nav-item" data-view="sec-lidar">🛰 Radar láser 360°</button>
      <button class="nav-item" data-view="sec-ik">🦿 Cómo caminan las patas</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">superior</div>
      <button class="nav-item" data-view="sup-vision">👁 Visión artificial</button>
      <button class="nav-item" data-view="sup-slam">⊕ SLAM</button>
      <button class="nav-item" data-view="sup-api">{ } API</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">avanzado</div>
      <button class="nav-item" data-view="dev">🛠 Modo desarrollador</button>
    </div>
    <div class="sidebar-foot">
      Proyecto de tesis<br><b>Universidad Valle del Momboy</b>
    </div>
  </nav>

  <!-- AREA DE CONTENIDO (se renderiza el modulo activo) -->
  <main class="content" id="view"></main>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
